# CommonProject Template
# https://copier.readthedocs.io/
#
# Generic base project template. Creates a project skeleton with:
# - BMAD methodology (pre-initialized)
# - Plane project (auto-created in 33god workspace)
# - mise environment management
# - CLI coder configs (Claude, Codex, Gemini, etc.)

_min_copier_version: "9.0.0"
_subdirectory: template
_templates_suffix: .jinja
_envops:
  block_start_string: "{%"
  block_end_string: "%}"
  variable_start_string: "{{"
  variable_end_string: "}}"
  comment_start_string: "{#"
  comment_end_string: "#}"

# --- Questions (only what we can't derive) ---

project_name:
  type: str
  help: Project name
  validator: "{% if not project_name %}Required{% endif %}"

project_description:
  type: str
  help: One-line description
  default: ""

# --- Derived (never asked) ---

project_slug:
  type: str
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"
  when: false

user_name:
  type: str
  default: Jarad
  when: false

user_skill_level:
  type: str
  default: advanced
  when: false

# --- Post-generation tasks ---

_tasks:
  - "cp ~/.config/git/ignore .gitignore 2>/dev/null || echo '# Add ignores here' > .gitignore"
  - "chmod +x .scripts/setup-plane.sh .mise/tasks/setup 2>/dev/null || true"
  - "python3 .scripts/setup-plane.sh"
  - "git init"
  - "git add -A"
  - "ALLOW_NO_TICKET=1 git commit -m 'Initial commit'"
