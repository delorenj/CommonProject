# CommonProject Template
# https://copier.readthedocs.io/
#
# Generic base project template. Creates a project skeleton with:
# - BMAD methodology (pre-initialized)
# - Plane project (auto-created in 33god workspace)
# - mise environment management
# - CLI coder configs (Claude, Codex, Gemini, etc.)

_min_copier_version: "9.0.0"
_subdirectory: template
_templates_suffix: .jinja
_envops:
  block_start_string: "{%"
  block_end_string: "%}"
  variable_start_string: "{{"
  variable_end_string: "}}"
  comment_start_string: "{#"
  comment_end_string: "#}"

# --- Questions (only what we can't derive) ---

project_name:
  type: str
  help: Project name
  validator: "{% if not project_name %}Required{% endif %}"

project_description:
  type: str
  help: One-line description
  default: ""

# Ticket board provider for this project. The board itself is created by
# init-project.sh (create-plane-project.sh) BEFORE copier runs; its identity is
# threaded back in via plane_* below and persisted into .project.json so it is
# the single source of truth shared with the hermes-agent template's agents.
ticket_provider:
  type: str
  help: Ticket board provider this project's board lives in
  default: plane
  choices:
    Linear: linear
    Plane: plane
    Trello: trello

# --- Derived (never asked) ---

project_slug:
  type: str
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"
  when: false

# Board binding — supplied by init-project.sh's --data-file after the board is
# created. Defaults keep a bare `copier copy` rendering valid (empty binding).
plane_workspace:
  type: str
  default: "33god"
  when: false

plane_project_id:
  type: str
  default: ""
  when: false

project_identifier:
  type: str
  default: "{{ project_slug[:4] | upper }}"
  when: false

plane_base:
  type: str
  default: "https://plane.delo.sh"
  when: false

# Drives conditional blocks in rendered files (e.g. _.python.venv in mise.toml).
# Not asked interactively; init-project.sh can override via --data-file.
primary_language:
  type: str
  default: python
  when: false

# --- Post-generation tasks ---

_tasks:
  - "cp ~/.config/git/ignore .gitignore 2>/dev/null || echo '# Add ignores here' > .gitignore"
  - "ln -sf AGENTS.md CLAUDE.md"
  - "ln -sf AGENTS.md GEMINI.md"
  # Stamp the repo's absolute path into .project.json (the SOT) post-render.
  - "python3 -c \"import json,os,pathlib; p=pathlib.Path('.project.json'); d=json.loads(p.read_text()); d['repo_path']=os.getcwd(); p.write_text(json.dumps(d,indent=2)+chr(10))\""
  - "mise trust"
