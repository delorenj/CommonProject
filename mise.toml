[env]
_.file = [".env"]
_.path = [".mise/scripts"]
CODEX_HOME = { value = ".codex", path = true }

# This block will handle the linking of 
# agent files to the main AGENTS.md file.
#
# TODO: Ensure this works for all levels of nesting.
# i.e. All linked agent files MUST be siblings at 
# any given level of nesting.
[hooks]
enter = '{{config_root}}/.mise/scripts/link-agentfiles.sh'

[[watch_files]]
patterns = ["AGENTS.md"]
task = "link-agentfiles"

[tasks]
# Project initialization - creates Plane project + runs Copier
init-project = { run = ".mise/scripts/init-project.sh", description = "Initialize new 33GOD project with Plane + Copier" }
init-project-non-interactive = { run = ".mise/scripts/init-project.sh --non-interactive", description = "Non-interactive project init" }

# Direct Plane project creation
create-plane-project = { run = ".mise/scripts/create-plane-project.sh", description = "Create a Plane project and output ID" }

# Template testing
test-template = { run = "bash .scripts/test-template.sh", description = "Run template test scenarios" }

# Template linting
lint-template = { run = "copier lint", description = "Lint the Copier template" }

# Development
dev = { run = "echo 'Run: mise run init-project'", description = "Placeholder for project-specific dev" }

[tasks.link-agentfiles]
description = "Symlink all agent files to AGENTS.md"
run = ".mise/scripts/link-agentfiles.sh"
